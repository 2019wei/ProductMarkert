<!DOCTYPE html>
<html lang="zh-Hant">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>農產品交易行情看板</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
        crossorigin="anonymous"></script>
    <script src="https://unpkg.com/axios@1.6.7/dist/axios.min.js"></script>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js" integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo=" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="./css/style.css">
</head>

<body>
    <!-- Top shortcut -->
    <div class="top"> <a href="#">↑</a></div>
    
    <!-- Loading spinner overlay -->
    <div class="" id="isLoading"></div>
    
    <!-- Sticky Top Wrapper (keeps header controls, tabs, and table headers fixed at top) -->
    <div class="sticky-top-wrapper">
        <!-- Header Controls -->
        <div class="header-glass">
            <div class="container-fluid px-0">
                <h1 class="fs-4 mt-0 mb-3 fw-bold text-center">📊 農產品行情看板</h1>
                <div class="row g-2">
                    <div class="col-6">
                        <select class="form-select form-select-custom" id="selectMarketName">
                            <option value="台北一">台北一</option>
                            <option value="台北二">台北二</option>
                        </select>
                    </div>
                    <div class="col-6">
                        <input type="date" class="form-control form-input-custom" id="selectDate">
                    </div>
                </div>
            </div>
        </div>

        <!-- Navigation Tabs -->
        <div class="container-fluid px-3">
            <ul class="nav nav-tabs nav-tabs-custom" id="myTab" role="tablist">
                <li class="nav-item" role="presentation">
                  <button class="nav-link active" id="home-tab" data-bs-toggle="tab" data-bs-target="#home-tab-pane" type="button" role="tab" aria-controls="home-tab-pane" aria-selected="true">🥬 蔬菜類</button>
                </li>
                <li class="nav-item" role="presentation">
                  <button class="nav-link" id="profile-tab" data-bs-toggle="tab" data-bs-target="#profile-tab-pane" type="button" role="tab" aria-controls="profile-tab-pane" aria-selected="false">🍎 水果類</button>
                </li>
            </ul>

            <!-- Fixed Column Table Headers -->
            <div class="price-table-header">
                <div class="header-col-name">作物名稱</div>
                <div class="header-col-prices">
                    <span class="price-lbl">上價</span>
                    <span class="price-lbl">中價</span>
                    <span class="price-lbl">下價</span>
                </div>
            </div>
        </div>
    </div>

    <!-- Main Content -->
    <div class="container-fluid px-3 mt-2">
        <div class="content">
            <div class="tab-content" id="myTabContent">
                <div class="tab-pane fade show active" id="home-tab-pane" role="tabpanel" aria-labelledby="home-tab" tabindex="0">
                    <div id="printTableA"></div>
                </div>
                <div class="tab-pane fade" id="profile-tab-pane" role="tabpanel" aria-labelledby="profile-tab" tabindex="0">
                    <div id="printTableB"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const selectDate = document.getElementById('selectDate') ?? null;
        const selectMarketName = document.getElementById('selectMarketName') ?? null;
        const isLoading = document.getElementById('isLoading') ?? null;
        selectDate.addEventListener("change", DateAndNameChangeEvent);
        selectMarketName.addEventListener("change", DateAndNameChangeEvent);

        let fruitList = [];
        let vegList = [];
        let favoritesKeyword = [];
        window.onload = pageInit();

        // 頁面初始化
        function pageInit() {
            const now = new Date();
            now.setHours(now.getHours() + 8);
            const today = now.toISOString().split('T')[0];
            selectDate.value = today;
            selectMarketName.value = '台北一';
            loadFavorite();
            getDataApi();
        }

        // 加入loading
        function addLoading(){
            isLoading.classList.add("loading");
        }
        // 去除loading
        function removeLoading(){
            isLoading.classList.remove("loading");
        }

        // 取得cookie
        function getCookie(name) {
            var cookieName = name + "=";
            var decodedCookie = decodeURIComponent(document.cookie);
            var cookieArray = decodedCookie.split(';');
            for (var i = 0; i < cookieArray.length; i++) {
                var cookie = cookieArray[i];
                while (cookie.charAt(0) == ' ') {
                    cookie = cookie.substring(1);
                }
                if (cookie.indexOf(cookieName) == 0) {
                    return cookie.substring(cookieName.length, cookie.length);
                }
            }
            return "";
        }

        // 設置cookie
        function setCookie(name, value) {
            document.cookie = name + "=" + value + ";path=/";
        }

        // 切換收藏狀態
        function toggleFavorite(id) {
            var favorites = getCookie("favorites").split(",").filter(x => x !== "");
            var index = favorites.indexOf(id);
            const ele = document.getElementById(id) ?? null;
            if (index === -1) {
                favorites.push(id);
                if (ele) ele.textContent = '❤️';
            } else {
                favorites.splice(index, 1);
                if (ele) ele.textContent = '🤍';
            }
            setCookie("favorites", favorites.join(","));
            
            loadFavorite();
            
            customListSort(fruitList, favoritesKeyword);
            printTable(fruitList, 'N05');
            
            customListSort(vegList, favoritesKeyword);
            printTable(vegList, 'N04');
        }

        // 載入 cookie 到變數
        function loadFavorite(){
            favoritesKeyword = [];
            var favStr = getCookie("favorites");
            if (favStr) {
                var favorites = favStr.split(",");
                favorites.forEach(element => {
                    if (element) favoritesKeyword.push(element);
                });
            }
        }

        // 當日期或市場改變時
        function DateAndNameChangeEvent(){
            loadFavorite();
            getDataApi();
        }

        // 日期轉換民國年格式
        function TaiwanDate(ADdate) {
            const parts = ADdate.split('-');
            const yearInROC = parseInt(parts[0]) - 1911;
            const rocDateString = yearInROC.toString() + '-' + parts[1] + '-' + parts[2];
            return rocDateString.replace(/-/g, ".");
        }

        // 串接API
        function getDataApi(){
            addLoading();
            const replacedString = TaiwanDate(selectDate.value);
            const fruitApi = 'https://data.moa.gov.tw/Service/OpenData/FromM/FarmTransData.aspx';
            const VegApi = 'https://data.moa.gov.tw/Service/OpenData/FromM/FarmTransData.aspx';
            const params1 = { 
                StartDate: replacedString,
                EndDate: replacedString,
                Market: selectMarketName.value,
                TcType: 'N05' 
            };
            const params2 = { 
                StartDate: replacedString,
                EndDate: replacedString,
                Market: selectMarketName.value,
                TcType: 'N04' 
            };

            Promise.all([
                axios.get(fruitApi, { params: params1 }),
                axios.get(VegApi, { params: params2 })
            ])
                .then(responses => {
                    const response1 = responses[0];
                    const response2 = responses[1];
                    
                    fruitList = response1.data || [];
                    customListSort(fruitList, favoritesKeyword);
                    printTable(fruitList, 'N05');

                    vegList = response2.data || [];
                    customListSort(vegList, favoritesKeyword);
                    printTable(vegList, 'N04');
                })
                .catch(error => {
                    console.error('發生錯誤:', error);
                })
                .finally(()=>{
                    removeLoading();
                });
        }

        // 排序：收藏排最前
        function customListSort(itemList, keyword){
            const compareByKeyword = (keyword) => (a, b) => {
                const aKey = a['種類代碼'] + '_' + a['作物代號'];
                const bKey = b['種類代碼'] + '_' + b['作物代號'];
                const aContains = keyword.includes(aKey);
                const bContains = keyword.includes(bKey);

                if (aContains && !bContains) {
                    return -1;
                } else if (!aContains && bContains) {
                    return 1;
                } else {
                    return 0;
                }
            };
            itemList.sort(compareByKeyword(keyword));
        }

        // 渲染列表 (簡化單列設計，不重複上中下價文字)
        function printTable(list, ProductType) {
            let str = '';
            
            if (list.length === 0) {
                str = `
                <div class="text-center py-5 text-muted">
                    <p class="fs-1">📭</p>
                    <p>本日無交易資料</p>
                </div>`;
            } else {
                str += '<div class="price-list-container">';
                list.forEach(item => {
                    let id = `${item['種類代碼']}_${item['作物代號']}`;
                    let isFav = favoritesKeyword.indexOf(id) !== -1;
                    let heart = isFav ? '❤️' : '🤍';
                    
                    str += `
                    <div class="price-list-item">
                        <div class="item-left">
                            <span id='${id}' onclick="toggleFavorite('${id}')" class="fav-btn">${heart}</span>
                            <span class="product-name">${item["作物名稱"]}</span>
                        </div>
                        <div class="item-right">
                            <span class="price-val-mini up">${item["上價"] || '-'}</span>
                            <span class="price-val-mini mid">${item["中價"] || '-'}</span>
                            <span class="price-val-mini down">${item["下價"] || '-'}</span>
                        </div>
                    </div>
                    `;
                });
                str += '</div>';
            }

            if (ProductType === 'N04') document.getElementById('printTableA').innerHTML = str;
            if (ProductType === 'N05') document.getElementById('printTableB').innerHTML = str;
        }

    </script>
</body>

</html>
